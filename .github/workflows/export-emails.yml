name: Export email previews

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  export-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export React Email templates
        run: npm run build

      - name: Upload exported HTML
        uses: actions/upload-artifact@v4
        with:
          name: exported-email-html
          path: out/